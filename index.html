<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Prédictions F1 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">F1 2026 • Prédictions</div>
      <div class="players-select">
        <label for="playerSelect">Participant :</label>
        <select id="playerSelect"></select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Calendrier & Prédictions</h2>
        <div id="raceList" class="race-list"></div>
      </section>

      <section class="card">
        <h2>Classement général</h2>
        <table class="table" id="leaderboardTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Participant</th>
              <th>Points</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="card">
        <h2>Résultats officiels (admin)</h2>
        <p class="hint">
          Pour l’instant : saisie manuelle. Plus tard on pourra brancher l’API Ergast.
        </p>
        <div id="resultsAdmin"></div>
      </section>
    </main>

    <footer class="footer">
      Points : 1er = 5 pts • 2e = 3 pts • 3e = 1 pt — Données stockées en localStorage.
    </footer>

    <script src="script.js"></script>
  </body>
</html>
